<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <!-- Tab icon: just the logo, no tile. It flips with the browser's tab-bar
         theme — white logo on a dark tab bar, black logo on a light one. The
         .ico is a plain fallback for browsers that ignore the media queries. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" media="(prefers-color-scheme: dark)" href="/favicon-white.png" />
    <link rel="icon" type="image/png" media="(prefers-color-scheme: light)" href="/favicon-black.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>RateXp Feedback</title>
    <meta
      name="description"
      content="Real-time dashboard for rating agent skills — browse feedback, inspect full conversations, and see the top-rated skills."
    />

    <!-- Link-preview cards (WhatsApp, Slack, iMessage, Facebook, etc.). Pasting
         the URL turns it into a card with a title, description and the og-image.
         Scrapers need a PUBLIC https url and ABSOLUTE image urls — these point at
         the deployed Azure host. If the app moves to a custom domain, update the
         absolute urls below to match. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RateXp" />
    <meta property="og:url" content="https://ratexp-app-4y6yju.azurewebsites.net/" />
    <meta property="og:title" content="RateXp — Skill feedback dashboard" />
    <meta
      property="og:description"
      content="Real-time dashboard for rating agent skills — browse feedback, inspect full conversations, and see the top-rated skills."
    />
    <meta property="og:image" content="https://ratexp-app-4y6yju.azurewebsites.net/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RateXp logo and tagline" />

    <!-- Twitter/X uses its own card tags (also read by some other apps). -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RateXp — Skill feedback dashboard" />
    <meta
      name="twitter:description"
      content="Real-time dashboard for rating agent skills — browse feedback, inspect full conversations, and see the top-rated skills."
    />
    <meta name="twitter:image" content="https://ratexp-app-4y6yju.azurewebsites.net/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply the saved theme before render so there's no light/dark flash.
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('ratexp-theme') || 'dark'
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
