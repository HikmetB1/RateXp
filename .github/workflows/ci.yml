name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uvx ruff check core/ app/app-be/
      - run: uvx ruff format --check core/ app/app-be/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Test core
        working-directory: core
        run: |
          uv sync --frozen --extra test
          uv run pytest -q
      - name: Test app-be
        working-directory: app/app-be
        run: |
          uv sync --frozen --extra test
          uv run pytest -q
      - name: Test skills-consumer
        working-directory: functions/skills-consumer
        run: |
          uv sync --frozen --extra test
          uv run pytest -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Bring up the stack
        run: docker compose up --build -d
      - name: Wait for core + dashboard
        run: |
          for url in http://localhost:8000/healthz http://localhost:8001/healthz; do
            for i in $(seq 1 30); do
              curl -fsS "$url" && break
              sleep 2
            done
          done
      - name: Whole-app tests
        run: uv run --no-project --with pytest --with httpx pytest tests/
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: app/app-fe
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ratexp-core ./core
      - run: docker build -t ratexp-app -f app/Dockerfile ./app
