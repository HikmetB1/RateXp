# core runtime config. Every key is required - a missing key fails loudly at startup.

# ATIF schema version stamped on every stored transcript. Bump when atif.py's shape changes.
schema_version: ATIF-v1.7

# Largest request body core accepts, in bytes (guards /transcript). 5 MiB.
max_body_bytes: 5242880

# Per-IP request budget per minute (token bucket). 0 disables the limiter.
rate_limit_per_minute: 120

# Default survey sampling when /snippet omits `every`: ~1 in N runs (1 = always,
# 2 = ~half). A skill can override per call with ?every=N. Must be >= 1.
default_survey_every: 2

# PII redaction for consented transcripts (Azure AI Language). When enabled, each
# transcript's conversation text is sent to Azure to mask personal data before
# storage; on error the upload is dropped (fail-closed). No secret - core uses its
# Managed Identity, like the database. Set enabled: false to run locally.
redaction:
  enabled: true
  # Azure AI Language endpoint (custom subdomain so Entra ID token auth works).
  endpoint: "https://ratexp-lang-4y6yju.cognitiveservices.azure.com/"
  # PII model languages; each message is auto-detected, falling back to the first.
  # The 10 most-spoken languages (BCP-47 codes).
  languages:
    - en       # English
    - zh-hans  # Mandarin Chinese
    - hi       # Hindi
    - es       # Spanish
    - fr       # French
    - ar       # Arabic
    - bn       # Bengali
    - pt       # Portuguese
    - ru       # Russian
    - ur       # Urdu
